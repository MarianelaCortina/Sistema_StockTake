<h1 class="titulo-venta">Nueva Venta</h1>

<mat-card class="venta-card">
  <mat-card-content>

    <!-- ✅ FORMULARIO PARA AGREGAR PRODUCTO -->
    <form [formGroup]="formularioProductoVenta" (ngSubmit)="agregarProductoParaVenta()">

      <mat-grid-list cols="4" rowHeight="80px">

        <!-- 🔍 Autocomplete producto -->
        <mat-grid-tile colspan="2">
          <mat-form-field appearance="fill" class="full-width">
            <mat-label>Producto</mat-label>
            <input
              matInput
              type="text"
              placeholder="Buscar..."
              formControlName="producto"
              [matAutocomplete]="auto"
            />

            <mat-autocomplete
              autoActiveFirstOption
              #auto="matAutocomplete"
              (optionSelected)="productoParaVenta($event)"
              [displayWith]="mostrarProducto"
            >
              <mat-option *ngFor="let option of listaProductosFiltro" [value]="option">
                {{ option.nombre }} — Stock: {{ option.stock }}
              </mat-option>
            </mat-autocomplete>
          </mat-form-field>
        </mat-grid-tile>

        <!-- 🔢 Cantidad -->
        <mat-grid-tile>
          <mat-form-field appearance="fill" class="full-width" style="margin-left: 40px;">
            <mat-label>Cantidad</mat-label>
            <input matInput type="number" formControlName="cantidad" min="1" autocomplete="off" />
          </mat-form-field>
        </mat-grid-tile>

        <!-- ➕ Botón agregar -->
        <mat-grid-tile>
          <button
            mat-raised-button
            color="primary"
            style="width: 80%;"
            [disabled]="formularioProductoVenta.invalid"
            type="submit"
          >
            <mat-icon>add</mat-icon> Agregar
          </button>
        </mat-grid-tile>

      </mat-grid-list>

    </form>

    <!-- ✅ TIPO DE PAGO + TOTAL -->
    <mat-grid-list cols="4" rowHeight="80px">
      <mat-grid-tile colspan="2"></mat-grid-tile>

      <!-- 💳 Tipo de pago -->
      <mat-grid-tile>
        <mat-form-field appearance="fill" class="full-width" style="margin-left: 40px;">
          <mat-label>Tipo de pago</mat-label>
          <mat-select [(value)]="tipoPagoPorDefecto">
            <mat-option value="Efectivo">Efectivo</mat-option>
            <mat-option value="Tarjeta">Tarjeta</mat-option>
          </mat-select>
        </mat-form-field>
      </mat-grid-tile>

      <!-- 🧮 Total -->
      <mat-grid-tile>
        <button mat-raised-button color="accent" style="width: 80%;">
          Total: ARS {{ totalPagar.toFixed(2) }}
        </button>
      </mat-grid-tile>
    </mat-grid-list>

    <!-- ✅ TABLA DETALLE DE VENTA -->
    <div class="mat-elevation-z2">
      <mat-table [dataSource]="datosDetalleVenta">

        <!-- Producto -->
        <ng-container matColumnDef="producto">
          <th mat-header-cell *matHeaderCellDef>Producto</th>
          <td mat-cell *matCellDef="let element">
            {{ element.descripcionProducto }}
          </td>
        </ng-container>

        <!-- Cantidad -->
        <ng-container matColumnDef="cantidad">
          <th mat-header-cell *matHeaderCellDef>Cantidad</th>
          <td mat-cell *matCellDef="let element">
            {{ element.cantidad }}
          </td>
        </ng-container>

        <!-- Precio -->
        <ng-container matColumnDef="precio">
          <th mat-header-cell *matHeaderCellDef>Precio</th>
          <td mat-cell *matCellDef="let element">
            {{ element.precioTexto }}
          </td>
        </ng-container>

        <!-- Total -->
        <ng-container matColumnDef="total">
          <th mat-header-cell *matHeaderCellDef>Total</th>
          <td mat-cell *matCellDef="let element">
            {{ element.totalTexto }}
          </td>
        </ng-container>

        <!-- Acción -->
        <ng-container matColumnDef="accion">
          <th mat-header-cell *matHeaderCellDef style="width: 80px;"></th>
          <td mat-cell *matCellDef="let element">
            <button mat-icon-button color="warn" (click)="eliminarProducto(element)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnasTabla"></tr>
        <tr mat-row *matRowDef="let row; columns: columnasTabla;"></tr>
      </mat-table>
    </div>

    <!-- ✅ BOTÓN REGISTRAR -->
    <mat-grid-list cols="4" rowHeight="80px">
      <mat-grid-tile colspan="3"></mat-grid-tile>

      <mat-grid-tile>
        <button
          mat-raised-button
          color="primary"
          style="width: 80%;"
          [disabled]="listaProductosParaVenta.length < 1 || bloquearBotonRegistrar"
          (click)="registrarVenta()"
        >
          <mat-icon>new_label</mat-icon> Registrar
        </button>
      </mat-grid-tile>

    </mat-grid-list>

  </mat-card-content>
</mat-card>
