<div class="page-container">

  <h1 class="title">Reporte de Ventas</h1>

  <mat-card class="card-container">
    <mat-card-content>

      <form [formGroup]="formularioFiltro" (ngSubmit)="buscarVentas()">
        <div class="form-row">

          <mat-form-field appearance="outline">
            <mat-label>Fecha inicio</mat-label>
            <input matInput [matDatepicker]="picker1" formControlName="fechaInicio">
            <mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
            <mat-datepicker #picker1></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Fecha fin</mat-label>
            <input matInput [matDatepicker]="picker2" formControlName="fechaFin">
            <mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
            <mat-datepicker #picker2></mat-datepicker>
          </mat-form-field>

          <button mat-raised-button color="primary"
            [disabled]="formularioFiltro.invalid"
            class="boton-buscar"
            type="submit">
            Buscar
          </button>
        </div>
      </form>

      <button mat-raised-button color="warn"
        [disabled]="dataVentaReporte.data.length < 1"
        class="btn-exportar"
        (click)="exportarExcel()">
        Exportar Excel
      </button>

      <div class="table-container mat-elevation-z2">
        <table mat-table [dataSource]="dataVentaReporte">

          <ng-container matColumnDef="fechaRegistro">
            <th mat-header-cell *matHeaderCellDef>Fecha</th>
            <td mat-cell *matCellDef="let element">{{element.fechaRegistro}}</td>
          </ng-container>

          <ng-container matColumnDef="numeroDocumento">
            <th mat-header-cell *matHeaderCellDef>N° Venta</th>
            <td mat-cell *matCellDef="let element">{{element.numeroDocumento}}</td>
          </ng-container>

          <ng-container matColumnDef="tipoPago">
            <th mat-header-cell *matHeaderCellDef>Pago</th>
            <td mat-cell *matCellDef="let element">{{element.tipoPago}}</td>
          </ng-container>

          <ng-container matColumnDef="producto">
            <th mat-header-cell *matHeaderCellDef>Producto</th>
            <td mat-cell *matCellDef="let element">{{element.producto}}</td>
          </ng-container>

          <ng-container matColumnDef="cantidad">
            <th mat-header-cell *matHeaderCellDef>Cant.</th>
            <td mat-cell *matCellDef="let element">{{element.cantidad}}</td>
          </ng-container>

          <ng-container matColumnDef="precio">
            <th mat-header-cell *matHeaderCellDef>Precio</th>
            <td mat-cell *matCellDef="let element">{{element.precio}}</td>
          </ng-container>

          <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef>Total</th>
            <td mat-cell *matCellDef="let element">{{element.total}}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columnasTabla"></tr>
          <tr mat-row *matRowDef="let row; columns: columnasTabla;"></tr>

        </table>

        <mat-paginator [pageSizeOptions]="[5,10,20]" showFirstLastButtons></mat-paginator>
      </div>

    </mat-card-content>
  </mat-card>
</div>
